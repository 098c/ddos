      text-align: left;

    body.fade {

    }

    .typing-container {
      position: relative;
      display: inline-block;
      text-shadow: none;
    }

    #text {
      white-space: pre-wrap;
    }

    .cursor {
      display: inline-block;
      width: 3px;
      height: 46px;
      background: #00ff88;
      vertical-align: bottom;
      animation: blink 0.8s infinite, pulse 1.4s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    @keyframes pulse {
      0%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(1.15); }
    }
  </style>
</head>

    async function enterFullscreen() {
      try {
        if (!document.fullscreenElement) {
          await document.documentElement.requestFullscreen();
        }
      } catch (err) {}
    }

    document.addEventListener("keydown", async (e) => {
      if (e.key.toLowerCase() === "f") {
        if (document.fullscreenElement) {
          await document.exitFullscreen();
        } else {
          await enterFullscreen();
        }
      }
    });

    function s(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function t(html) {
      if (isBusy) return;
      isBusy = true;

      let i = 0;

      while (i < html.length) {
        if (html[i] === "<") {
          const closeIndex = html.indexOf(">", i);
          const tag = html.substring(i, closeIndex + 1);

          currentHTML += tag;
          textElement.innerHTML = currentHTML;

          i = closeIndex + 1;
        } else {
          currentHTML += html[i];
          textElement.innerHTML = currentHTML;

          window.scrollTo({
            top: document.body.scrollHeight,
            behavior: "smooth"
          });

          i++;

          await s(Math.random() * 90 + 35);
        }
      }

      isBusy = false;
    }

    async function d(amount) {
      if (isBusy) return;
      isBusy = true;

      for (let i = 0; i < amount; i++) {
        if (currentHTML.endsWith(">")) {
          let j = currentHTML.length - 1;

          while (j >= 0 && currentHTML[j] !== "<") {
            j--;
          }

          currentHTML = currentHTML.slice(0, j);
        } else {
          currentHTML = currentHTML.slice(0, -1);
        }

        textElement.innerHTML = currentHTML;

        window.scrollTo({
          top: document.body.scrollHeight,
          behavior: "smooth"
        });

        await s(Math.random() * 50 + 25);
      }

      isBusy = false;
    }

    function p(html) {
      currentHTML += html;
      textElement.innerHTML = currentHTML;

      window.scrollTo({
        top: document.body.scrollHeight,
        behavior: "smooth"

    }

    function clearAllText() {
      currentHTML = "";
      textElement.innerHTML = "";
    }

    async function e() {

      document.body.style.background = "#000000";
      textElement.style.color = "#000000";
      const cursor = document.querySelector(".cursor");
      if (cursor) cursor.style.display = "none";

      await s(500);

      isBusy = false;
    }
